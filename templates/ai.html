<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI助手 - 考研学习网站</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">📚 考研学习网站</a>
    <ul class="navbar-links">
      <li><a href="/plan">考研计划</a></li>
      <li><a href="/vocabulary">英语词汇</a></li>
      <li><a href="/ai" class="active">AI助手</a></li>
    </ul>
  </nav>

  <main class="container">
    <a href="/" class="back-link">← 返回首页</a>
    
    <div class="page-header">
      <h1>🤖 AI 学习助手</h1>
      <p class="subtitle">085801 路线答疑：数学二 · 英语二 · 政治 · 817模电数电</p>
    </div>

    <!-- AI对话区域 -->
    <div class="ai-container">
      <div class="chat-messages">
        <div class="chat-message ai">
          <div class="sender">AI 助手</div>
          <div class="content">👋 你好！我是 085801 学习助教。可以帮你拆解题目、安排复习和分析错因；招生政策、真题来源等信息会提示你以学校与研招网官方公告为准。</div>
        </div>
      </div>

      <!-- 输入区域 -->
      <form id="chat-form" class="chat-input-area">
        <input type="text" id="chat-input" placeholder="输入你的问题..." autocomplete="off">
        <button type="submit">发送</button>
      </form>
    </div>

    <!-- 快捷问题 -->
    <div class="content-section" style="margin-top: 1.5rem;">
      <h2 class="section-title">💬 快捷问题</h2>
      <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem;">
        <button class="vocab-filter-btn" onclick="askQuestion('数学二二重积分怎么复习？')">数学二复习</button>
        <button class="vocab-filter-btn" onclick="askQuestion('英语二图表作文如何练习？')">英语二作文</button>
        <button class="vocab-filter-btn" onclick="askQuestion('政治什么时候开始准备？')">政治何时开始</button>
        <button class="vocab-filter-btn" onclick="askQuestion('817共射放大电路怎么分析？')">817专业课</button>
        <button class="vocab-filter-btn" onclick="askQuestion('每天学习多少小时合适？')">学习时长</button>
      </div>
    </div>
  </main>

  <script src="/static/js/main.js"></script>
  <script>
    // 快捷问题点击
    function askQuestion(text) {
      const input = document.getElementById('chat-input');
      input.value = text;
      input.dispatchEvent(new Event('input'));
      document.getElementById('chat-form').dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>

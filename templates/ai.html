<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI助手 - 考研学习网站</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">📚 考研学习网站</a>
    <ul class="navbar-links">
      <li><a href="/plan">考研计划</a></li>
      <li><a href="/vocabulary">英语词汇</a></li>
      <li><a href="/ai" class="active">AI助手</a></li>
    </ul>
  </nav>

  <main class="container">
    <a href="/" class="back-link">← 返回首页</a>
    
    <div class="page-header">
      <h1>🤖 AI 学习助手</h1>
      <p class="subtitle">智能答疑 · 学习规划建议 · 备考咨询</p>
    </div>

    <!-- AI对话区域 -->
    <div class="ai-container">
      <div class="chat-messages">
        <div class="chat-message ai">
          <div class="sender">AI 助手</div>
          <div class="content">👋 你好！我是考研AI助手，有什么可以帮助你的吗？<br><br>你可以问我：<br>• 各科学习方法<br>• 复习计划建议<br>• 考研时间安排<br>• 专业课难点解答</div>
        </div>
      </div>

      <!-- 输入区域 -->
      <form id="chat-form" class="chat-input-area">
        <input type="text" id="chat-input" placeholder="输入你的问题..." autocomplete="off">
        <button type="submit">发送</button>
      </form>
    </div>

    <!-- 快捷问题 -->
    <div class="content-section" style="margin-top: 1.5rem;">
      <h2 class="section-title">💬 快捷问题</h2>
      <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem;">
        <button class="vocab-filter-btn" onclick="askQuestion('数学应该怎么复习？')">数学怎么复习？</button>
        <button class="vocab-filter-btn" onclick="askQuestion('英语作文模板推荐')">英语作文模板</button>
        <button class="vocab-filter-btn" onclick="askQuestion('政治什么时候开始准备？')">政治何时开始</button>
        <button class="vocab-filter-btn" onclick="askQuestion('专业课电路和自控哪个更难？')">专业课建议</button>
        <button class="vocab-filter-btn" onclick="askQuestion('每天学习多少小时合适？')">学习时长</button>
      </div>
    </div>
  </main>

  <script src="/static/js/main.js"></script>
  <script>
    // 快捷问题点击
    function askQuestion(text) {
      const input = document.getElementById('chat-input');
      input.value = text;
      input.dispatchEvent(new Event('input'));
      document.getElementById('chat-form').dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>
